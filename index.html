<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Store Landing Page</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SIDE MENU -->
<div class="menu" id="menu">
  <div class="menu-header">
    <h3>MyStore</h3>
    <i class="fas fa-times" id="closeMenu"></i>
  </div>

  <a href="#">Home</a>
  <a href="#">Templates</a>
  <a href="#">Pricing</a>
  <a href="#">About</a>
  <a href="#">Contact</a>

  <div class="menu-bottom">
  <a href="privacy.html">Privacy Policy</a>
  <a href="terms.html">Terms of Use</a>
  <a href="refund.html">Refund Policy</a>
</div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay"></div>

<div class="top-bar">

<header id="header">
  <div class="search-bar" id="searchBar">

    <!-- MENU -->
    <i class="fas fa-bars" id="menuBtn"></i>

    <!-- LOGO -->
    <div class="logo-inside">MyStore</div>

    <!-- INPUT -->
    <input type="text" placeholder="Search templates..." id="searchInput">

    <!-- SEARCH -->
    <i class="fas fa-search" id="searchIcon"></i>

  </div>
</header>

<section class="categories">
  <div class="scroll">
    <div class="cat active" data-category="mobiles">Home</div>
    <div class="cat" data-category="laptops">Templates</div>
  </div>
</section>

</div>

<section class="content">
<div class="section-head">
<h2 id="sectionTitle">Mobiles</h2>
<div id="countText">10 Products</div>
</div>

<div class="grid" id="products"></div>
</section>

<footer>

<!-- LINKS SECTION -->
<div class="footer-links">
  <a href="privacy.html">Privacy Policy</a>
  <a href="terms.html">Tearms of Use</a>
  <a href="refund.html">Refund Policy</a>

</div>

<!-- COPYRIGHT -->
<div class="copy">© 2026 MyStore. All rights reserved.</div>

</footer>
<script src="script.js"></script>
</body>
</html>

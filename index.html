<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Store Landing Page</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<div class="left">
<i class="fas fa-bars icon"></i>
<div class="logo">MyStore</div>
</div>

<!-- <i class="fas fa-search icon"></i> -->
</header>

<!--<div class="notice-bar">
<div class="notice-track">
⚡ Flat 50% OFF  • Free Shipping •  Buy 1 Get 1 Free •
</div>
</div>-->

<section class="hero">
<h5>Explore templates for all your needs!</h5>
<!--p>Templates for all your needs!</p-->

<div class="search-box">
<div class="search-wrap">
<input type="text" placeholder="Search..." id="searchInput">
<button class="close-search" id="clearBtn">
<i class="fas fa-search" style="font-size: 1.5em;"></i>
</button>
</div>
</div>
</section>

<section class="categories">
<div class="scroll">
<div class="cat active" data-category="mobiles">Mobiles</div>
<div class="cat" data-category="laptops">Laptops</div>
<div class="cat" data-category="fashion">Fashion</div>
<div class="cat" data-category="audio">Audio</div>
<div class="cat" data-category="gaming">Gaming</div>
</div>
</section>

<section class="content" id="contentSection">
<div class="section-head">
<h2 class="section-title" id="sectionTitle">Mobiles</h2>
<div class="count" id="countText">10 Products</div>
</div>

<div class="grid" id="products"></div>
</section>

<section class="quick-links">
<div class="links-wrap">
<a href="#">Offers</a>
<a href="#">Orders</a>
<a href="#">Wishlist</a>
<a href="#">Support</a>
</div>
</section>

<footer>
<div class="footer-links">
<a href="#">About</a>
<a href="#">Privacy</a>
<a href="#">Terms</a>
<a href="#">Help</a>
</div>

<div class="copy">© 2026 MyStore. All rights reserved.</div>
</footer>

<script src="script.js"></script>
</body>
</html>
